<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 20px 16px 12px;
      margin-bottom: 20px;
      text-align: right;
    }

    .display .expression {
      color: #a0aec0;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 6px;
      word-break: break-all;
    }

    .display .result {
      color: #e2e8f0;
      font-size: 36px;
      font-weight: 300;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      padding: 18px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      font-weight: 500;
    }

    button:active { transform: scale(0.94); opacity: 0.8; }

    .btn-number {
      background: #1a1a2e;
      color: #e2e8f0;
    }

    .btn-operator {
      background: #0f3460;
      color: #63b3ed;
    }

    .btn-equals {
      background: #e94560;
      color: white;
    }

    .btn-clear {
      background: #2d3748;
      color: #fc8181;
    }

    .btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="deleteLast()">⌫</button>
      <button class="btn-operator" onclick="inputOperator('%')">%</button>
      <button class="btn-operator" onclick="inputOperator('/')">÷</button>

      <button class="btn-number" onclick="inputNumber('7')">7</button>
      <button class="btn-number" onclick="inputNumber('8')">8</button>
      <button class="btn-number" onclick="inputNumber('9')">9</button>
      <button class="btn-operator" onclick="inputOperator('*')">×</button>

      <button class="btn-number" onclick="inputNumber('4')">4</button>
      <button class="btn-number" onclick="inputNumber('5')">5</button>
      <button class="btn-number" onclick="inputNumber('6')">6</button>
      <button class="btn-operator" onclick="inputOperator('-')">−</button>

      <button class="btn-number" onclick="inputNumber('1')">1</button>
      <button class="btn-number" onclick="inputNumber('2')">2</button>
      <button class="btn-number" onclick="inputNumber('3')">3</button>
      <button class="btn-operator" onclick="inputOperator('+')">+</button>

      <button class="btn-number btn-zero" onclick="inputNumber('0')">0</button>
      <button class="btn-number" onclick="inputDecimal()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let expression = '';
    let shouldReset = false;

    function updateDisplay() {
      document.getElementById('result').textContent = current;
      document.getElementById('expression').textContent = expression;
    }

    function inputNumber(num) {
      if (shouldReset) { current = num; shouldReset = false; }
      else current = current === '0' ? num : current + num;
      updateDisplay();
    }

    function inputDecimal() {
      if (shouldReset) { current = '0.'; shouldReset = false; }
      else if (!current.includes('.')) current += '.';
      updateDisplay();
    }

    function inputOperator(op) {
      expression = current + ' ' + (op === '*' ? '×' : op === '/' ? '÷' : op === '-' ? '−' : op) + ' ';
      shouldReset = true;
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      try {
        const full = expression + current;
        const result = Function('"use strict"; return (' + expression.replace('×','*').replace('÷','/').replace('−','-') + current + ')')();
        expression = full + ' =';
        current = parseFloat(result.toFixed(10)).toString();
        shouldReset = true;
        updateDisplay();
      } catch(e) { current = 'Error'; updateDisplay(); }
    }

    function clearAll() {
      current = '0'; expression = ''; shouldReset = false;
      updateDisplay();
    }

    function deleteLast() {
      if (shouldReset) return;
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
      else if (e.key === '.') inputDecimal();
      else if (e.key === '+') inputOperator('+');
      else if (e.key === '-') inputOperator('-');
      else if (e.key === '*') inputOperator('*');
      else if (e.key === '/') { e.preventDefault(); inputOperator('/'); }
      else if (e.key === '%') inputOperator('%');
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') deleteLast();
      else if (e.key === 'Escape') clearAll();
    });
  </script>
</body>
</html>
